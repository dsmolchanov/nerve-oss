# Stalwart dev config (local only).
# Based on Stalwart minimal config + JMAP HTTP listener.
# See: https://stalw.art/docs/configuration/overview and https://stalw.art/docs/http/jmap/overview/

[server]
hostname = "local.nerve.email"

[server.listener."smtp"]
bind = ["[::]:25"]
protocol = "smtp"

[server.listener."imap"]
bind = ["[::]:143"]
protocol = "imap"

[server.listener."jmap"]
bind = ["[::]:8080"]
protocol = "http"
tls.implicit = false

[storage]
data = "rocksdb"
fts = "rocksdb"
blob = "rocksdb"
lookup = "rocksdb"
directory = "memory"

[store."rocksdb"]
type = "rocksdb"
path = "/opt/stalwart/data"
compression = "lz4"

[directory."memory"]
type = "memory"

[[directory."memory".principals]]
name = "admin"
class = "admin"
description = "Admin"
secret = "adminpass"
email = ["admin@local.nerve.email"]

[[directory."memory".principals]]
name = "dev"
class = "individual"
description = "Dev User"
secret = "devpass"
email = ["dev@local.nerve.email"]

[tracer."stdout"]
type = "stdout"
level = "info"
ansi = false
enable = true

[authentication.fallback-admin]
user = "admin"
secret = "adminpass"
